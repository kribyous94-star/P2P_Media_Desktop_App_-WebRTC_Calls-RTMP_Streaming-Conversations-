# =============================================================================
# P2P Media App — Nginx : sous-domaine sur serveur partagé
#
# Usage : ce fichier ajoute UN bloc server dédié à cette application sur un
#         serveur qui héberge déjà d'autres sites. Il ne modifie RIEN
#         aux configurations existantes.
#
# Exemple de sous-domaine : media.votre-domaine.com
#
# Installation :
#   1. Copier ce fichier :
#        sudo cp subdomain.conf /etc/nginx/sites-available/p2pmedia
#   2. Remplacer TOUTES les occurrences de "media.votre-domaine.com" par votre
#      sous-domaine réel.
#   3. Remplacer /chemin/vers/le/projet par le chemin absolu du dépôt.
#   4. Activer le site :
#        sudo ln -s /etc/nginx/sites-available/p2pmedia /etc/nginx/sites-enabled/
#   5. Obtenir le certificat SSL (Let's Encrypt) :
#        sudo certbot --nginx -d media.votre-domaine.com
#   6. Recharger nginx :
#        sudo nginx -t && sudo systemctl reload nginx
#
# Variables d'environnement à mettre à jour dans apps/server/.env :
#   ALLOWED_ORIGINS=https://media.votre-domaine.com
#
# Variables à mettre à jour dans apps/desktop/.env (avant npm run build) :
#   VITE_API_URL=https://media.votre-domaine.com
#   VITE_WS_URL=wss://media.votre-domaine.com/ws
# =============================================================================

# Upstream backend Fastify (nom unique pour ne pas entrer en conflit)
upstream p2p_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# --------------------------------------------------------------------------
# HTTP → HTTPS redirect (sous-domaine uniquement)
# --------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name media.votre-domaine.com;

    # Challenge Let's Encrypt (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------------
# HTTPS — serveur principal (sous-domaine)
# --------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name media.votre-domaine.com;

    # ---- SSL (certificats générés par certbot) ----
    ssl_certificate     /etc/letsencrypt/live/media.votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.votre-domaine.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;   # géré par certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;         # géré par certbot

    # ---- En-têtes de sécurité ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ---- Compression gzip ----
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript application/x-javascript
        application/wasm image/svg+xml;

    # ---- Frontend statique (Vite build) ----
    root  /chemin/vers/le/projet/apps/desktop/dist;
    index index.html;

    # Assets Vite (hashed filenames) — cache long
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|svg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- API REST → backend ----
    location /api/ {
        proxy_pass         http://p2p_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";    # désactiver keep-alive HTTP/1.0
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---- WebSocket (/ws) → backend ----
    location /ws {
        proxy_pass         http://p2p_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # Garder les connexions WS ouvertes longtemps (signaling WebRTC)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;
    }

    # ---- SPA fallback (React Router) ----
    # Tout chemin inconnu renvoie index.html pour que React Router prenne la main.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Logs ----
    access_log /var/log/nginx/p2pmedia.access.log;
    error_log  /var/log/nginx/p2pmedia.error.log warn;
}
